<!DOCTYPE html>
<html>
<head>
<title>Mini CRM</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#6a11cb,#2575fc);
}
.container{
width:80%;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px gray;
text-align:center;
}
h1{
background:#ff9800;
color:white;
padding:15px;
border-radius:10px;
}
input,select{
width:80%;
padding:10px;
margin:8px;
border:1px solid gray;
border-radius:5px;
}
button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#218838;
}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}
th{
background:#2575fc;
color:white;
padding:10px;
}
td{
border:1px solid gray;
padding:10px;
}
footer{
margin-top:20px;
background:#222;
color:white;
padding:10px;
border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>Client Lead Management System</h1>

<input type="text" id="name" placeholder="Client Name">
<input type="email" id="email" placeholder="Email">
<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>

<br>
<button onclick="addLead()">Add Lead</button>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
</tr>
<tbody id="data"></tbody>
</table>

<footer>
© 2026 Mini CRM Project
</footer>

</div>

<script>
function addLead(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let status=document.getElementById("status").value;

if(name==""||email==""){
alert("Enter all details");
return;
}

let row="<tr><td>"+name+"</td><td>"+email+"</td><td>"+status+"</td></tr>";
document.getElementById("data").innerHTML+=row;

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("status").selectedIndex=0;
}
</script>

</body>
</html>
